server {
    listen 80;
    server_name localhost;

    # 1. Normal Kullanıcı Trafiği (Vue.js dosyalarını sunar)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        # Vue Router'ın sayfaları yenileyince 404 vermemesi için kritik ayar:
        try_files $uri $uri/ /index.html; 
    }

    # 2. API Trafiği (İstekleri Backend'e yönlendirir)
    location /api/ {
        # İstekleri Docker içindeki wsports_backend konteynerinin 8000 portuna pasla
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}